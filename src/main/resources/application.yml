server:
  port: 18790
  address: 0.0.0.0
spring:
  application:
    name: jclaw
  main:
    banner-mode: off
  web:
    resources:
      static-locations: classpath:/web/
  
  # ============================================
  # Spring AI 标准配置
  # ============================================
  # 配置优先级：
  # 1. spring.ai.* 配置（Spring AI 标准）
  # 2. jclaw.* 配置（向后兼容）
  # ============================================
  ai:
    # OpenAI 配置
    openai:
      api-key: ${OPENAI_API_KEY:sk-580}
      base-url: ${OPENAI_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${CHAT_MODEL:deepseek-chat}
          temperature: 0.7
          max-tokens: 16384


