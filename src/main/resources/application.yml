spring:
  application:
    name: jclaw
  main:
    banner-mode: off
  web:
    resources:
      static-locations: classpath:/web/

server:
  port: 18790
  address: 0.0.0.0

# ============================================
# jclaw 配置
# ============================================
# 配置优先级（从高到低）：
# 1. application.yml 中的 jclaw.* 配置
# 2. ~/.jclaw/config.json 配置
# 3. 默认配置
# ============================================

jclaw:
  # ==========================================
  # Agent 配置
  # ==========================================
  agent:
    # 工作空间路径（所有文件操作都限制在此目录下）
    workspace: ~/.jclaw/workspace
    # 默认使用的模型名称（必须在 models.definitions 中定义）
    model: qwen3.6-plus
    # 默认使用的提供商（可选，如果未指定则从模型定义中获取）
    provider: dashscope
    # 最大生成 Token 数
    max-tokens: 16384
    # 温度参数（0.0-2.0，值越高随机性越大）
    temperature: 0.7
    # 最大工具迭代次数
    max-tool-iterations: 20
    # 是否启用心跳（用于定时任务）
    heartbeat-enabled: false
    # 是否限制文件操作到工作空间
    restrict-to-workspace: false
    # 命令黑名单（禁止执行的命令）
    command-blacklist:
      - rm -rf /
      - :(){ :|:& };:

    # ========================================
    # 进化功能配置
    # ========================================
    evolution:
      # 是否启用反馈收集
      feedback-enabled: false
      # 反馈保留天数
      feedback-retention-days: 30
      # 是否收集隐式反馈（工具成功率等）
      implicit-feedback-enabled: true
      # 工具调用成功率对评分的影响权重
      tool-success-weight: 0.3
      # 用户重试次数对评分的惩罚权重
      retry-penalty-weight: 0.2
      # 会话消息长度对评分的影响权重
      session-length-weight: 0.1
      # 是否启用 Prompt 优化
      prompt-optimization-enabled: false
      # Prompt 优化策略
      optimization-strategy: SELF_REFINE
      # 优化检查间隔（小时）
      optimization-interval-hours: 24
      # 新 Prompt 采用的分数阈值（0.0-1.0）
      adoption-threshold: 0.7
      # 是否自动应用优化
      auto-apply-optimization: false
      # 优化时使用的 LLM 温度参数
      optimization-temperature: 0.3
      # 优化时的最大 token 数
      optimization-max-tokens: 2048
      # 最大保留的优化历史版本数
      max-history-versions: 10
      # Self-Refine 策略：回顾的最近会话数量
      self-refine-session-count: 5

    # ========================================
    # 多 Agent 协同配置
    # ========================================
    collaboration:
      # 是否启用多 Agent 协同
      enabled: false
      # 默认最大对话轮数
      default-max-rounds: 10
      # 默认共识阈值（0.0-1.0）
      default-consensus-threshold: 0.7
      # 超时时间（毫秒）
      timeout-ms: 60000



  # ==========================================
  # LLM 提供商配置
  # ==========================================
  providers:
    # OpenRouter（聚合多个模型提供商）
    openrouter:
      api-key: "${OPENROUTER_API_KEY:}"
      api-base: "https://openrouter.ai/api/v1"
    
    # 阿里云 DashScope (通义千问)
    dashscope:
      api-key: "sk-b7"
      api-base: "https://dashscope.aliyuncs.com/compatible-mode/v1"

  # ==========================================
  # 消息通道配置
  # ==========================================
  channels:
    # Telegram
    telegram:
      enabled: false
      token: "${TELEGRAM_BOT_TOKEN:}"
      allow-from: []
    
    # Discord
    discord:
      enabled: false
      token: "${DISCORD_BOT_TOKEN:}"
      allow-from: []
    
    # WhatsApp (通过 bridge)
    whatsapp:
      enabled: false
      bridge-url: "ws://localhost:3001"
      allow-from: []
    
    # 飞书
    feishu:
      enabled: true
      app-id: "cli_a"
      app-secret: "3t"
      encrypt-key: "${FEISHU_ENCRYPT_KEY:}"
      verification-token: "${FEISHU_VERIFICATION_TOKEN:}"
      connection-mode: "websocket"
      allow-from: []
    
    # 钉钉
    dingtalk:
      enabled: false
      client-id: "${DINGTALK_CLIENT_ID:}"
      client-secret: "${DINGTALK_CLIENT_SECRET:}"
      webhook: "${DINGTALK_WEBHOOK:}"
      connection-mode: "stream"
      allow-from: []
    
    # QQ
    qq:
      enabled: false
      app-id: "${QQ_APP_ID:}"
      app-secret: "${QQ_APP_SECRET:}"
      allow-from: []
    
    # MaixCam
    maixcam:
      enabled: false
      host: "0.0.0.0"
      port: 18790
      allow-from: []

  # ==========================================
  # 网关配置
  # ==========================================
  gateway:
    # 是否启用网关服务（启用后会启动完整的网关服务，包括通道管理、定时任务等）
    enabled: true
    # 监听地址
    host: 0.0.0.0
    # 监听端口
    port: 18790
    # 基本认证用户名（可选）
    username: "admin"
    # 基本认证密码（可选）
    password: "123456"
    # CORS 允许的来源
    cors-origin: "*"
    # 每分钟请求限制
    rate-limit-per-minute: 60

  # ==========================================
  # 工具配置
  # ==========================================
  tools:
    # 网络搜索工具
    web:
      search:
        # Brave Search API Key（用于网络搜索）
        api-key: "${BRAVE_API_KEY:}"
        # 最大搜索结果数
        max-results: 5
    
    # 技能工具
    skills:
      # 是否允许 GitHub 全网搜索
      allow-global-search: false
      # GitHub Token（用于提高 API 速率限制）
      github-token: "${GITHUB_TOKEN:}"

  # ==========================================
  # 社交网络配置（Agent 间通信）
  # ==========================================
  social-network:
    # 是否启用社交网络
    enabled: false
    # 社交网络端点
    endpoint: "https://clawdchat.ai/api"
    # Agent ID
    agent-id: "${AGENT_ID:}"
    # API Key
    api-key: "${SOCIAL_NETWORK_API_KEY:}"
    # Agent 名称
    agent-name: "jclaw"
    # Agent 描述
    agent-description: "A lightweight AI agent built with Java"

  # ==========================================
  # MCP 服务器配置
  # ==========================================
  mcp-servers:
    # 是否启用 MCP
    enabled: false
